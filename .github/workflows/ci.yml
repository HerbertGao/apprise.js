name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Thresholds live in vitest.config.ts — this fails if coverage regresses.
      - run: pnpm run test:coverage

  test:
    name: test + build (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build
      # Needs dist/. Proves a real bundler does not tree-shake away the plugin
      # registration side effects (invisible to the Node suite — see the script).
      - run: pnpm run test:bundle
