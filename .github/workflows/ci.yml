name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Static scan of the test sources: a failure-path `notify()/add() === false`
      # holds for every failure reason, so on its own it pins nothing. Each must
      # sit beside a mechanism assertion (diagnostic kind, request count, elapsed).
      - run: pnpm run test:assertions

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Thresholds live in vitest.config.ts — this fails if coverage regresses.
      - run: pnpm run test:coverage

  test:
    name: test + build (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7
        with:
          # No job here pushes or publishes — don't leave the token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build
      # Both need dist/, and both are invisible to the Node suite (vitest runs
      # src/, never the built artifact). Orthogonal: one asks whether a bundler
      # tree-shakes registration away, the other whether registration lands in
      # the same table across ESM/CJS load combinations.
      - run: pnpm run test:bundle
      - run: pnpm run test:formats
